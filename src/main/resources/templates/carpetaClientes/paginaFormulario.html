<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Formulario de Cliente</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4" style="max-width: 600px;">
		<div class="card shadow-sm mb-5">
			<div class="card-header bg-dark text-white py-3">
				<h4 class="mb-0" th:text="${cliente.uuid} != null ? '✏️ Editar Datos del Cliente' : '👤 Registrar Nuevo Cliente'"></h4>
			</div>
			<div class="card-body p-4">
				<form th:action="${cliente.uuid} == null ? @{/rutaClientes/guardar} : @{/rutaClientes/actualizar}" 
					  method="post" th:object="${cliente}">

					<input type="hidden" th:field="*{uuid}" />

					<div class="mb-3">
						<label class="form-label fw-bold">Nombre Completo:</label>
						<input type="text" class="form-control" th:field="*{nombre}" />
						<div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-bold">Correo Electrónico:</label>
						<input type="email" class="form-control" th:field="*{correo}" />
						<div class="text-danger small" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">Error</div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-bold">Teléfono:</label>
						<input type="text" class="form-control" th:field="*{telefono}" />
						<div class="text-danger small" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}">Error</div>
					</div>

					<hr class="my-4">
					<div class="d-flex justify-content-end gap-2">
						<a th:href="@{/rutaClientes/listar}" class="btn btn-secondary px-4">Cancelar</a>
						<button type="submit" class="btn btn-dark px-4">Guardar Cliente</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>

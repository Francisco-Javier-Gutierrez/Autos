<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Catálogo de Clientes</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	
	<div class="container-fluid mt-4 px-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>Gestión de Clientes</h2>
			<a th:href="@{/rutaClientes/nuevo}" class="btn btn-success">➕ Registrar Nuevo Cliente</a>
		</div>

		<div class="table-responsive shadow-sm rounded">
			<table class="table table-bordered table-striped align-middle bg-white m-0">
				<thead class="text-white text-center" style="background-color: #0d6efd;">
					<tr>
						<th>Nombre</th>
						<th>Correo Electrónico</th>
						<th>Teléfono</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="cliente : ${clientes}">
						<td th:text="${cliente.nombre}"></td>
						<td th:text="${cliente.correo}"></td>
						<td class="text-center" th:text="${cliente.telefono}"></td>
						<td class="text-center">
							<div class="d-flex gap-1 justify-content-center">
								<a th:href="@{'/rutaClientes/editar/' + ${cliente.uuid}}" class="btn btn-sm btn-primary">✏️ Editar</a>
								<a th:href="@{'/rutaClientes/eliminar/' + ${cliente.uuid}}" 
								   class="btn btn-sm btn-danger" 
								   onclick="return confirm('¿Está seguro de que desea eliminar este cliente?')">🗑️ Eliminar</a>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(clientes)}">
						<td colspan="5" class="text-center text-muted py-4">No hay clientes registrados en el catálogo.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>

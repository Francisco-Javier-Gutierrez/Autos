<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Gestión de Colores</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>Lista de Colores Registrados</h2>
			<button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalColor">
				📦 Registrar Color Nuevo
			</button>
		</div>

		<div class="alert alert-info py-2" th:if="${mensaje}" th:text="${mensaje}"></div>

		<div class="card shadow-sm mb-4">
			<div class="card-body p-0">
				<table class="table table-striped table-hover text-center mb-0 align-middle">
					<thead class="table-light">
						<tr>
							<th>ID Detalle</th>
							<th>Nombre del Color</th>
							<th>Estado / Disponibilidad</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="col : ${colores}">
							<td th:text="${col.id}" class="fw-bold">1</td>
							<td th:text="${col.nombre}">Azul</td>
							<td>
								<span th:text="${col.estadoColor}" 
									  th:classappend="${col.estadoColor.name() == 'Disponible'} ? 'badge bg-success' : 'badge bg-secondary'">
									Disponible
								</span>
							</td>
							<td>
								<div class="d-inline-flex gap-2">
									<a th:href="@{/rutaColores/editar/{uuid}(uuid=${col.uuid})}" class="btn btn-primary btn-sm px-3">
										✏️ Editar
									</a>
									<a th:href="@{/rutaColores/eliminar/{uuid}(uuid=${col.uuid})}" 
									   class="btn btn-danger btn-sm px-3"
									   onclick="return confirm('¿Estás seguro de eliminar este color?');">
										🗑️ Eliminar
									</a>
								</div>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(colores)}">
							<td colspan="4" class="text-muted py-4">No hay colores registrados en el sistema.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="modalColor" data-bs-backdrop="static" tabindex="-1" aria-labelledby="modalColorLabel" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-lg">
				<div class="modal-content">
					
					<div class="modal-header bg-light">
						<h5 class="modal-title fw-bold" id="modalColorLabel">
							<span th:text="${color.uuid} != null ? '✏️ Editar Color Seleccionado' : '📦 Registrar Color Nuevo'"></span>
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					
					<form th:action="${color.uuid} == null ? @{/rutaColores/guardar} : @{/rutaColores/actualizar}" method="post" th:object="${color}">
						<div class="modal-body">
							<input type="hidden" th:field="*{uuid}" />
							<input type="hidden" th:field="*{id}" />

							<div class="row">
								<div class="col-md-6 mb-3">
									<label class="form-label fw-semibold">Nombre del Color:</label>
									<input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej. Rojo, Verde Mar..." />
									<div class="text-danger small" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</div>
								</div>
								
								<div class="col-md-6 mb-3">
									<label class="form-label fw-semibold">Estado:</label>
									<select class="form-select" th:field="*{estadoColor}">
										<option value="" disabled selected>-- Selecciona un Estado --</option>
										<option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}"></option>
									</select>
									<div class="text-danger small" th:if="${#fields.hasErrors('estadoColor')}" th:errors="*{estadoColor}">Error</div>
								</div>
							</div>
						</div>
						
						<div class="modal-footer">
							<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
							<button type="submit" class="btn btn-success px-4">Guardar</button>
						</div>
					</form>
					
				</div>
			</div>
		</div>

	</div>

	<script th:if="${color.uuid != null or #fields.hasErrors('${color.*}')}">
		window.addEventListener('DOMContentLoaded', () => {
			const miModal = new bootstrap.Modal(document.getElementById('modalColor'));
			miModal.show();
		});
	</script>
</body>

</html>

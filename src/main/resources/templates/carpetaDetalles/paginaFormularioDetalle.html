<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Formulario de Inventario</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4" style="max-width: 800px;">
		<div class="card shadow-sm mb-5">
			<div class="card-header bg-dark text-white py-3">
				<h4 class="mb-0" th:text="${detalle.id} != null ? '✏️ Editar Registro de Inventario' : '📦 Registrar Stock de Producto'"></h4>
			</div>
			<div class="card-body p-4">
				<form th:action="@{/rutaDetalles/guardar}" method="post" th:object="${detalle}">

					<input type="hidden" th:field="*{id}" />

					<div class="mb-4">
						<label class="form-label fw-bold">Seleccionar Vehículo (Información Completa):</label>
						<select class="form-select" th:field="*{productoId}">
							<option value="">--- Selecciona un Auto de la Lista ---</option>
							<option th:each="pro : ${productos}" 
							        th:value="${pro.id}" 
							        th:text="'[ID: ' + ${pro.id} + '] ' + 
							                 '[UUID: ' + ${pro.uuid} + '] — ' + 
							                 ${pro.marca} + ' ' + ${pro.subMarca} + ' ' + ${pro.modelo} + ' ' + 
							                 '(' + ${pro.anio} + ') — ' + 
							                 '$' + ${pro.precio} + ' | ' + 
							                 'Estado: ' + ${pro.estado} + ' | ' + 
							                 'Valoración: ' + ${pro.valoracionRubiFA} + '⭐ | ' + 
							                 'Fav Perla: ' + (${pro.favoritoPerlaMM} ? 'Sí' : 'No') + ' | ' + 
							                 'Interés Francisco: ' + ${pro.nivelInteresFranciscoJavierGH} + ' | ' + 
							                 'Reseña Francely: ' + ${pro.resenaFrancelyAnaidGH}">
							</option>
						</select>
						<div class="text-danger small" th:if="${#fields.hasErrors('productoId')}" th:errors="*{productoId}">Error</div>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">ID Color:</label>
							<input type="number" class="form-control" th:field="*{colorId}" placeholder="Ej. 1" />
							<div class="text-danger small" th:if="${#fields.hasErrors('colorId')}" th:errors="*{colorId}">Error</div>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Cantidad en Stock:</label>
							<input type="number" class="form-control" th:field="*{stock}" placeholder="Ej. 5" />
							<div class="text-danger small" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">Error</div>
						</div>
					</div>

					<div class="mb-4">
						<label class="form-label fw-bold">Tipo de Transmisión:</label>
						<select class="form-select" th:field="*{transmision}">
							<option value="">--- Selecciona Tipo de Transmisión ---</option>
							<option value="Estándar">Estándar</option>
							<option value="Automática">Automática</option>
						</select>
						<div class="text-danger small" th:if="${#fields.hasErrors('transmision')}" th:errors="*{transmision}">Error</div>
					</div>

					<hr class="my-4">
					<div class="d-flex justify-content-end gap-2">
						<a th:href="@{/rutaDetalles/listar}" class="btn btn-secondary px-4">Cancelar</a>
						<button type="submit" class="btn btn-dark px-4">Guardar en Inventario</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>

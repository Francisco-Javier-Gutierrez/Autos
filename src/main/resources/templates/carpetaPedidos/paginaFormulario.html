<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title th:text="${pedido.uuid} != null ? 'Editar Pedido' : 'Nuevo Pedido'"></title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<h1 th:text="${pedido.uuid} != null ? 'Editar Pedido' : 'Nuevo Pedido'" class="mb-4"></h1>

	<form th:action="${pedido.uuid} == null ? @{/rutaPedidos/guardar} : @{/rutaPedidos/actualizar}" method="post"
		th:object="${pedido}">

		<input type="hidden" th:field="*{uuid}" />

		<div class="mb-3">
			<label class="form-label">ID Detalle Producto:</label>
			<input type="number" class="form-control" th:field="*{idDetProd}" />
			<div class="text-danger" th:if="${#fields.hasErrors('idDetProd')}" th:errors="*{idDetProd}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">ID Cliente:</label>
			<input type="number" class="form-control" th:field="*{clienteId}" />
			<div class="text-danger" th:if="${#fields.hasErrors('clienteId')}" th:errors="*{clienteId}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Número de Factura:</label>
			<input type="text" class="form-control" th:field="*{numFactura}" />
			<div class="text-danger" th:if="${#fields.hasErrors('numFactura')}" th:errors="*{numFactura}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Cantidad:</label>
			<input type="number" step="1" class="form-control" th:field="*{cantidad}" />
			<div class="text-danger" th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Total:</label>
			<input type="number" step="0.01" class="form-control" th:field="*{total}" />
			<div class="text-danger" th:if="${#fields.hasErrors('total')}" th:errors="*{total}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Estatus:</label>
			<select class="form-control" th:field="*{estadoPedido}">
				<option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}">
				</option>
			</select>
		</div>

		<div class="mb-3">
			<label class="form-label">Valoración (Rubi FA):</label>
			<input type="number" min="1" max="5" class="form-control" th:field="*{valoracionRubiFA}" />
			<div class="text-danger" th:if="${#fields.hasErrors('valoracionRubiFA')}" th:errors="*{valoracionRubiFA}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Favorito (Perla MM):</label>
			<select class="form-control" th:field="*{favoritoPerlaMM}">
				<option th:value="true">Sí</option>
				<option th:value="false">No</option>
			</select>
		</div>

		<div class="mb-3">
			<label class="form-label">Reseña (Francely Anaid GH):</label>
			<input type="text" class="form-control" th:field="*{resenaFrancelyAnaidGH}" />
		</div>

		<div class="mb-3">
			<label class="form-label">Nivel de Interés (Francisco Javier GH):</label>
			<select class="form-control" th:field="*{nivelInteresFranciscoJavierGH}">
				<option value="1">Bajo</option>
				<option value="2">Medio</option>
				<option value="3">Alto</option>
			</select>
			<div class="text-danger" th:if="${#fields.hasErrors('nivelInteresFranciscoJavierGH')}" th:errors="*{nivelInteresFranciscoJavierGH}">Error</div>
		</div>

		<button type="submit" class="btn btn-success">Guardar</button>
		<a th:href="@{/rutaPedidos/listar}" class="btn btn-secondary">Cancelar</a>
	</form>
</body>

</html>

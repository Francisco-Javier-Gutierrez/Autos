<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Listado de Pedidos</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	<h1 th:text="${mensaje}">Listado de Pedidos</h1>

	<div class="container-fluid mt-4">
		<a th:href="@{/rutaPedidos/nuevo}" class="btn btn-primary mb-3">➕ Nuevo Pedido</a>

		<table class="table table-bordered table-striped table-sm">
			<thead class="table-dark">
				<tr>
					<th>Factura</th>
					<th>Fecha</th>
					<th>Cant.</th>
					<th>Total</th>
					<th>Estado</th>
					<th>Val. Rubi</th>
					<th>Fav. Perla</th>
					<th>Nivel Francisco</th>
					<th>Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="pedido : ${pedidos}">
					<td th:text="${pedido.numFactura}"></td>
					<td th:text="${#temporals.format(pedido.fechaPedido, 'dd-MM-yyyy HH:mm')}"></td>
					<td th:text="${pedido.cantidad}"></td>
					<td th:text="${pedido.total}"></td>
					<td th:text="${pedido.estadoPedido}"></td>
					<td th:text="${pedido.valoracionRubiFA}"></td>
					<td th:text="${pedido.favoritoPerlaMM ? '⭐' : ''}"></td>
					<td th:switch="${pedido.nivelInteresFranciscoJavierGH}">
						<span th:case="1">Bajo</span>
						<span th:case="2">Medio</span>
						<span th:case="3">Alto</span>
						<span th:case="*">-</span>
					</td>
					<td>
						<a th:href="@{'/rutaPedidos/editar/' + ${pedido.uuid}}" class="btn btn-sm btn-primary">✏️</a>
						<a th:href="@{'/rutaPedidos/eliminar/' + ${pedido.uuid}}"
							class="btn btn-sm btn-danger" onclick="return confirm('¿Está seguro?')">🗑️</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>

</html>

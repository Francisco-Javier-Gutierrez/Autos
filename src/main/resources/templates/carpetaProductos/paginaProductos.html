<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Inicio</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	<h1 th:text="${mensaje}">ñññññññññ</h1>

	<a th:href="@{/rutaProductos/nuevo}" class="btn btn-primary mb-3">➕ Nuevo Producto</a>

	<table class="table table-bordered table-striped">
		<thead class="table-dark">
			<tr>
				<th>Descripción</th>
				<th>FranciscoJavierGH</th>
				<th>Precio</th>
				<th>Existencias</th>
				<th>Estatus</th>
				<th>Acciones</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="producto : ${productos}">
				<td th:text="${producto.descripcion}"></td>
				<td th:text="${producto.gustaFranciscoJavierGH}"></td>
				<td th:text="${producto.precio}"></td>
				<td th:text="${producto.existencias}"></td>
				<td th:text="${producto.estatus}"></td>
				<td><a th:href="@{'/rutaProductos/editar/' + ${producto.uuid}}" class="btn btn-sm btn-primary">✏️
						Editar</a>
					<a th:href="@{'/rutaProductos/eliminar/' + ${producto.uuid}}"
						class="btn btn-sm btn-danger" onclick=" return confirm('¿Está seguro?')">✏️
						Eliminar</a>
				</td>
			</tr>
		</tbody>
	</table>
</body>

</html>

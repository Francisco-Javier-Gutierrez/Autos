<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Catálogo de Vehículos</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>
	
	<div class="container-fluid mt-4 px-4">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h2>Inventario de Vehículos (Productos)</h2>
			<a th:href="@{/rutaProductos/nuevo}" class="btn btn-success">➕ Registrar Nuevo Auto</a>
		</div>

		<div class="table-responsive shadow-sm rounded">
			<table class="table table-bordered table-striped align-middle bg-white m-0">
				<thead class="text-white text-center" style="background-color: #0d6efd;">
					<tr>
						<th>UUID</th>
						<th>Marca</th>
						<th>SubMarca</th>
						<th>Modelo</th>
						<th>Año</th>
						<th>Precio</th>
						<th>Condición</th>
						<th>Estatus</th>
						<th>Valoración RubiFA</th>
						<th>Favorito PerlaMM</th>
						<th>Nivel Interés FranciscoJavierGH</th>
						<th>Reseña FrancelyAnaidGH</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="producto : ${productos}">
						<td class="small text-muted fw-bold" th:text="${producto.uuid}"></td>
						<td th:text="${producto.marca}"></td>
						<td th:text="${producto.subMarca}"></td>
						<td th:text="${producto.modelo}"></td>
						<td class="text-center" th:text="${producto.anio}"></td>
						<td class="text-end fw-bold" th:text="${'$' + #numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}"></td>
						<td class="text-center" th:text="${producto.condicion}"></td>
						<td class="text-center">
							<span th:text="${producto.estado}" 
								  th:classappend="${producto.estado.name() == 'Disponible' ? 'badge bg-success' : 'badge bg-warning text-dark'}">
							</span>
						</td>
						<td class="text-center fw-bold text-warning" th:text="${producto.valoracionRubiFA + ' ⭐'}"></td>
						<td class="text-center">
							<span th:text="${producto.favoritoPerlaMM ? '⭐ Sí' : 'No'}" 
								  th:classappend="${producto.favoritoPerlaMM ? 'text-primary fw-bold' : 'text-muted'}">
							</span>
						</td>
						<td class="text-center fw-bold text-info" th:text="${producto.nivelInteresFranciscoJavierGH + '%'}"></td>
						<td class="small text-wrap" style="max-width: 200px;" th:text="${producto.resenaFrancelyAnaidGH}"></td>
						<td class="text-center">
							<div class="d-flex gap-1 justify-content-center">
								<a th:href="@{'/rutaProductos/editar/' + ${producto.uuid}}" class="btn btn-sm btn-primary">✏️ Editar</a>
								<a th:href="@{'/rutaProductos/eliminar/' + ${producto.uuid}}" 
								   class="btn btn-sm btn-danger" 
								   onclick="return confirm('¿Está seguro de que desea dar de baja este vehículo?')">🗑️ Eliminar</a>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(productos)}">
						<td colspan="13" class="text-center text-muted py-4">No hay vehículos registrados en el catálogo.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>
</html>

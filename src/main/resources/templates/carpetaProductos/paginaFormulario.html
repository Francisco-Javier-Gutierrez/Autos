<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Formulario de Vehículo</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4" style="max-width: 800px;">
		<div class="card shadow-sm mb-5">
			<div class="card-header bg-dark text-white py-3">
				<h4 class="mb-0" th:text="${producto.uuid} != null ? '✏️ Editar Datos del Vehículo' : '🚗 Registrar Nuevo Vehículo'"></h4>
			</div>
			<div class="card-body p-4">
				<form th:action="${producto.uuid} == null ? @{/rutaProductos/guardar} : @{/rutaProductos/actualizar}" 
					  method="post" th:object="${producto}">

					<input type="hidden" th:field="*{uuid}" />

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Marca:</label>
							<input type="text" class="form-control" th:field="*{marca}" />
							<div class="text-danger small" th:if="${#fields.hasErrors('marca')}" th:errors="*{marca}">Error</div>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">SubMarca:</label>
							<input type="text" class="form-control" th:field="*{subMarca}" />
							<div class="text-danger small" th:if="${#fields.hasErrors('subMarca')}" th:errors="*{subMarca}">Error</div>
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-bold">Modelo (Versión):</label>
						<input type="text" class="form-control" th:field="*{modelo}" />
						<div class="text-danger small" th:if="${#fields.hasErrors('modelo')}" th:errors="*{modelo}">Error</div>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Año:</label>
							<input type="number" class="form-control" th:field="*{anio}" />
							<div class="text-danger small" th:if="${#fields.hasErrors('anio')}" th:errors="*{anio}">Error</div>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Precio ($):</label>
							<input type="number" step="0.01" class="form-control" th:field="*{precio}" />
							<div class="text-danger small" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">Error</div>
						</div>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Condición:</label>
							<select class="form-select" th:field="*{condicion}">
								<option th:each="cond : ${condiciones}" th:value="${cond}" th:text="${cond}"></option>
							</select>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Estatus Operativo:</label>
							<select class="form-select" th:field="*{estado}">
								<option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
							</select>
						</div>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Valoración RubiFA (1-5):</label>
							<input type="number" min="1" max="5" class="form-control" th:field="*{valoracionRubiFA}" />
							<div class="text-danger small" th:if="${#fields.hasErrors('valoracionRubiFA')}" th:errors="*{valoracionRubiFA}">Error</div>
						</div>

						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Nivel de Interés FranciscoJavierGH:</label>
							<input type="number" class="form-control" th:field="*{nivelInteresFranciscoJavierGH}" />
						</div>
					</div>

					<div class="mb-3">
						<label class="form-label fw-bold">Reseña FrancelyAnaidGH:</label>
						<textarea class="form-control" rows="2" th:field="*{resenaFrancelyAnaidGH}"></textarea>
					</div>

					<div class="mb-3 form-check form-switch mt-3">
						<input class="form-check-input" type="checkbox" role="switch" id="favPerla" th:field="*{favoritoPerlaMM}">
						<label class="form-check-label fw-bold" for="favPerla">Marcar como Favorito PerlaMM ⭐</label>
					</div>

					<hr class="my-4">
					<div class="d-flex justify-content-end gap-2">
						<a th:href="@{/rutaProductos/listar}" class="btn btn-secondary px-4">Cancelar</a>
						<button type="submit" class="btn btn-dark px-4">Guardar Auto</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>

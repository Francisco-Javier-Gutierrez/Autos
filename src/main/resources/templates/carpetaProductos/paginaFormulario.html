<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Inicio</title>
	<div th:replace="~{fragmentos :: bootstrap}"></div>
</head>

<body>
	<div th:replace="~{fragmentos :: menu}"></div>

	<h1 th:text="${uuid} != null ? 'Editar Producto' : 'Nuevo Producto'" class="mb-4"></h1>

	<form th:action="${uuid} == null ? @{/rutaProductos/guardar} : @{/rutaProductos/actualizar}" method="post"
		th:object="${producto}">

		<input type="hidden" name="uuid" th:value="${uuid}" />

		<div class="mb-3">
			<label class="form-label">Descripción:</label>
			<input type="text" class="form-control" th:field="*{descripcion}" />
			<div class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">FranciscoJavierGH:</label>
			<input type="text" class="form-control" th:field="*{gustaFranciscoJavierGH}" />
			<div class="text-danger" th:if="${#fields.hasErrors('gustaFranciscoJavierGH')}"
				th:errors="*{gustaFranciscoJavierGH}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Precio:</label>
			<input type="number" step="0.01" class="form-control" th:field="*{precio}" />
			<div class="text-danger" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Existencias:</label>
			<input type="number" step="1" class="form-control" th:field="*{existencias}" />
			<div class="text-danger" th:if="${#fields.hasErrors('existencias')}" th:errors="*{existencias}">Error</div>
		</div>

		<div class="mb-3">
			<label class="form-label">Estatus:</label>
			<select class="form-control" th:field="*{estatus}">
				<option th:each="estado : ${estados}" th:value="${estado}" th:text="${estado}">
				</option>
			</select>
		</div>

		<button type="submit" class="btn btn-success">Guardar</button>
		<a th:href="@{/rutaProductos/listar}" class="btn btn-secondary">Cancelar</a>
	</form>
</body>

</html>
